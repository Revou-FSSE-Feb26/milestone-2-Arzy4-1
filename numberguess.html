<!DOCTYPE html>
<html lang="en" class="p-0 m-0">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="numberguess.css">
    <title>REVOFUN GAMES</title>
</head>
<body class="bg-slate-950 text-white">

    <header>

        <!-- Navbar Start -->
        <nav class="flex justify-between items-center py-4 px-8 fixed w-full z-100">

            <!-- Page Logo -->
            <img src="image/REVOFUN_Logo.png" alt="REVOFUN LOGO" href="#home" class="w-[150px]">

            <!-- Page Navigation -->
            <ul class="flex gap-8 text-xl">
                <li><a href="index.html">Home</a></li>
                <li class="relative group">
                    <a class="cursor-pointer">Games</a>
    
                    <!-- Dropdown Menu -->
                    <ul class="text-center absolute -translate-x-[63px] top-full mt-0 pt-2 w-48 rounded-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition duration-300">
                        <li class="px-4 py-2 duration-300 hover:scale-110 rounded-t-xl">
                            <a href="clicker.html">Click to Win</a>
                        </li>
                        <li class="px-4 py-2 duration-300 hover:scale-110">
                            <a href="numberguess.html">Guess the Number</a>
                        </li>
                        <li class="px-4 py-2 duration-300 hover:scale-110 rounded-b-xl">
                            <a href="rockpaperscissor.html">Rock Paper Scissors</a>
                        </li>
                    </ul>
                </li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>

        </nav>
        <!-- Navbar End -->

    </header>

    <main class="relative z-10 bg-slate-950">
        
        <div id="bg-image">

            <!-- Start Button -->
            <div id="start-button" class="bg-purple-500 absolute z-40 left-1/2 -translate-x-1/2 top-[45%] p-4 h-[150px] w-[300px] rounded-xl flex flex-col items-center justify-center gap-8">
                <h1 class="text-[18px] font-bold">Let's Play "Guess My Number"</h1>
                <button id="button" class="bg-purple-700 p-2 w-[200px] rounded-lg cursor-pointer">Start</button>
            </div>

            <div id="countdown" class="absolute left-1/2 -translate-x-1/2 top-[50%] -translate-y-1/2 text-[80px] font-extrabold hidden">
                3
            </div>

            <div id="game-container" class="opacity-0">

                <!-- Number Time Display -->
                <div class="bg-indigo-900 absolute left-1/2 -translate-x-1/2 top-[150px] p-4 w-[490px] h-[100px] opacity-[0.9] rounded-xl text-[30px] font-extrabold border-orange-400 border-5 rounded-xl outline-2 outline-orange-950 flex justify-center items-center">
                    <p>Timer : <span id="time-display" class="text-center">30</span>s</p>
                </div>

                <!-- Number Hint -->
                <div class="absolute bg-linear-to-b from-red-800 to-red-950 w-[490px] h-[120px] flex justify-center items-center p-4 top-[43%] left-1/2 -translate-x-1/2 rounded-2xl shadow-[0_10px_40px_rgba(6,182,212,0.9)]">
                    <p id="hint-text" class="bg-linear-to-b from-orange-600 to-orange-800 p-1 text-[30px] w-[400px] h-[100px] flex justify-center items-center font-extrabold text-yellow-200 rounded-full">Guess My Number</p>
                </div>

                <!-- Number Input -->
                <div class="absolute bg-linear-to-b from-green-500 to-green-900 w-[490px] h-[120px] flex justify-center items-center p-4 top-[60%] left-1/2 -translate-x-1/2 rounded-2xl shadow-[0_10px_40px_rgba(6,182,212,0.9)]">
                    <input id="guess-input" class="text-center text-[60px] font-extrabold text-yellow-200 w-[440px] focus:outline-none focus:ring-0 focus:border-none " type="number" placeholder="0"></input>
                </div>

                <!-- Number Enter -->
                <button id="guess-btn" class="absolute left-1/2 -translate-x-1/2 bottom-[100px] bg-indigo-800 hover:bg-indigo-700 hover:scale-105 transition duration-300 p-4 rounded-xl shadow-[0_10px_10px_rgba(5,46,22,0.9)] cursor-pointer">
                    <p class="font-extrabold text-[20px]">Guess This Number</p>
                </button>

            </div>

            <!-- Scoreboard -->
            <div id="scoreboard" class="absolute bg-indigo-950 border-orange-400 border-5 rounded-xl outline-2 outline-orange-950 p-10 flex flex-col gap-10 left-1/2 -translate-x-1/2 top-1/2 -translate-y-[120px] opacity-0 invisible">

                <div id="guess-display" class="flex flex-col items-center justify-center">
                    <p id="final-text" class="text-[20px] text-center"></p>
                    <span id="final-number" class="text-[40px] font-extrabold text-center leading-none"></span>
                </div>

                <div class="flex justify-between gap-10">
                    <div class="flex flex-col items-center text-center rounded-lg">
                        <p>Current Time</p>
                        <p class="bg-indigo-600 w-[200px] rounded-lg"><span id="final-time">0</span></p>
                    </div>
                    <div class="flex flex-col items-center text-center">
                        <p>Highscore Time</p>
                        <p class="bg-indigo-600 w-[200px] rounded-lg"><span id="highscore-time">0</span></p>
                    </div>
                </div>

                <div class="flex justify-center gap-10">
                    <button class="bg-indigo-900 hover:bg-blue-700 hover:scale-110 transition duration-300 p-4 w-[200px] rounded-lg" onclick="window.location.href='index.html'">Back to Home</button>
                    
                    <button id="restart" class="bg-indigo-900 hover:bg-blue-700 hover:scale-110 transition duration-300 p-4 w-[200px] rounded-lg">Restart</button>
                </div>

            </div>

        </div>

    </main>
    
    <script src="numberguess.js"></script>
</body>
</html>
