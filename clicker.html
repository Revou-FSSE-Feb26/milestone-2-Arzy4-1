<!DOCTYPE html>
<html lang="en" class="p-0 m-0">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="clicker.css">
    <title>REVOFUN GAMES</title>
</head>
<body class="bg-slate-950 text-white">

    <!-- Header Start -->
    <header>

        <div id="navbar-placeholder"></div>

    </header>
    <!-- Header End -->

    <main class="relative z-10 bg-slate-950">

        <section class="clicker-image relative h-[100vh]">

            <!-- Start Button -->
            <div id="start-button-container" class="bg-indigo-900 absolute z-40 left-1/2 -translate-x-1/2 top-[50%] -translate-y-1/2 p-4 py-6 w-[320px] rounded-xl flex flex-col items-center justify-center gap-8 text-center">
                <h1 class="text-[18px] font-bold">Let's Play "CLICK TO WIN!"</h1>
                <button class="start-button bg-blue-500 p-2 w-[200px] rounded-lg cursor-pointer">Start</button>
            </div>

            <!-- Scoreboard -->
            <div id="scoreboard" class="scoreboard absolute bg-indigo-950 border-orange-400 border-5 rounded-xl outline-2 outline-orange-950 opacity-0 p-10 flex flex-col gap-10 left-1/2 -translate-x-1/2 top-1/2 -translate-y-[120px]">

                <!-- Scoreboard Panel -->
                <div class="flex flex-col justify-between gap-10">

                    <!-- Current Score -->
                    <div class="flex flex-col items-center text-center rounded-lg">
                        <p>Current Score</p>
                        <span id="finalscore" class="bg-indigo-600 w-[200px] rounded-lg">0</span>
                    </div>

                    <!-- Highscore -->
                    <div class="flex flex-col items-center text-center">
                        <p>Highscore</p>
                        <span id="highscore" class="bg-indigo-600 w-[200px] rounded-lg">0</span>
                    </div>
                </div>

                <!-- Scoreboard Button -->
                <div class="flex justify-center gap-10">

                    <!-- Back To Home Button -->
                    <button class="bg-indigo-900 hover:bg-blue-700 hover:scale-110 transition duration-300 p-4 w-[200px] rounded-lg" onclick="window.location.href='index.html'">Back to Home</button>
                    
                    <!-- Restart Button -->
                    <button id="restart" class="bg-indigo-900 hover:bg-blue-700 hover:scale-110 transition duration-300 p-4 w-[200px] rounded-lg">Restart</button>
                </div>

            </div>

            <div id="score-timer-container" class="hidden">

                <!-- Timer Panel -->
                <div class="bg-indigo-950 border-orange-400 border-5 rounded-xl outline-2 outline-orange-950 absolute p-4 w-[200px] text-center top-1/4 right-1/2 -translate-x-1/2 opacity-90">
                    <p>TIME : <span id="timer">10</span>s</p>
                </div>

                <!-- Score Panel -->
                <div class="bg-indigo-950 border-orange-400 border-5 rounded-xl outline-2 outline-orange-950 absolute p-4 w-[200px] text-center top-1/4 left-1/2 translate-x-1/2 opacity-90">
                    <p>SCORE : <span id="score">0</span></p>
                </div>

            </div>

            <!-- Clicker Button -->
            <button id="button-img" type="button" class="hidden">
                <img src="image/REVOFUN_RedCircle.png" alt="Red Circle Image" class="button-img absolute w-[600px] top-[300px] right-[450px] transition-transform duration-500">
            </button>

            <button id="button-img-1" type="button" class="hidden">
                <img src="image/REVOFUN_RedCircle_1.png" alt="Red Circle 1 Image" class="button-img-1">
            </button>

            <button id="button-img-2" type="button" class="hidden">
                <img src="image/REVOFUN_RedCircle_2.png" alt="Red Circle 2 Image" class="button-img-2">
            </button>

            <button id="button-img-3" type="button" class="hidden">
                <img src="image/REVOFUN_RedCircle_3.png" alt="Red Circle 3 Image" class="button-img-3">
            </button>

        </section>

    </main>
    
    <script src="clicker.js"></script>
    <script src="navbar.js"></script>

</body>
</html>
