<!DOCTYPE html>
<html lang="en" class="p-0 m-0">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="rockpaperscissor.css">
    <title>REVOFUN GAMES</title>
</head>
<body class="bg-slate-950 text-white">

    <!-- Header Start -->
    <header>

        <div id="navbar-placeholder"></div>

    </header>
    <!-- Header End -->

    <main class="relative z-10 bg-slate-950">

        <section class="rps-image flex justify-center items-center relative h-[100vh]">
            <div class="game-container relative w-[1000px] h-[600px] p-10 flex justify-center items-center overflow-hidden border-4 border-orange-500 rounded-[4rem] shadow-[0_10px_30px_rgba(0,0,0,1)]">

                <!-- Game Title Container -->
                <div id="start" class="absolute flex flex-col items-center justify-center h-full gap-6 text-center">

                    <!-- Game Title -->
                    <h1 class="text-[25px]">Let's Play "<strong>ROCK PAPER SCISSOR!</strong>"</h1>

                    <!-- Start Button -->
                    <button type="button">
                        <img id="start-button" src="image/REVOFUN_StartText.png" alt="Start Button Image" aria-label="start-game" class="start-button w-[200px]">
                    </button>
                </div>

                <!-- Player Choices -->
                <div id="player-choices-box" class="absolute w-[900px] h-[500px] hidden">

                    <!-- Player -->
                    <img id="player-choice" src="image/REVOFUN_RockHand.png" alt="Weapon Rock Image" class="player-choice w-[250px] h-[250px] absolute top-1/6 ml-10 left-[-40%]">

                    <!-- Versus -->
                    <img id="versus" src="image/REVOFUN_VersusSymbol.png" alt="Versus Image" class="versus w-[300px] h-[250px] relative top-1/6 left-[295px]">
                    
                    <!-- Computer -->
                    <img id="computer-choice" src="image/REVOFUN_RockHand.png" alt="Weapon Rock Image" class="computer-choice w-[250px] h-[250px] rotate-y-[180deg] absolute top-1/6 right-1 mr-10 right-[-40%]">
                </div>

                <!-- Weapon Choice -->
                <div id="weapon" class="flex flex-col items-center justify-between h-full hidden">

                    <!-- Weapon Title -->
                    <h2 id="weapon-title" class="weapon-title relative text-2xl">ROCK PAPER SCISSOR</h2>

                    <div id="weapon-choice" class="weapon-choice relative flex flex-col items-center gap-8 hidden">

                        <!-- Weapon sub Title -->
                        <h3 class="text-xl">Choose Your Weapon</h3>

                        <!-- Weapon List -->
                        <ul class="flex justify-center gap-10">

                            <!-- Rock Image -->
                            <li class="Rock">
                                <img src="image/REVOFUN_RockHand1.png" alt="Weapon Rock Image">
                            </li>

                            <!-- Paper Image -->
                            <li class="Paper">
                                <img src="image/REVOFUN_PaperHand1.png" alt="Weapon Paper Image">
                            </li>

                            <!-- Scissor Image -->
                            <li class="Scissor">
                                <img src="image/REVOFUN_ScissorHand1.png" alt="Weapon Scissor Image">
                            </li>

                        </ul>
                    </div>

                    <!-- Result Container -->
                    <div id="result-box" class="result-box relative flex flex-col top-[25%] p-4 items-center gap-5 hidden">

                        <!-- Show Result Text -->
                        <h3 class="relative"></h3>

                        <!-- Back To Home and Restart Button -->
                        <div class="flex justify-center gap-10">

                            <!-- Back To Home Button -->
                            <button class="relative bg-indigo-900 hover:bg-blue-700 hover:scale-105 transition duration-300 p-4 w-[200px] rounded-lg" onclick="window.location.href='index.html'">Back to Home</button>
                            
                            <!-- Restart Button -->
                            <button id="restart" class="relative bg-indigo-900 hover:bg-blue-700 hover:scale-105 transition duration-300 p-4 w-[200px] rounded-lg">Restart</button>

                        </div>

                    </div>

                    <!-- Score Box -->
                    <div id="score-box" class="score-box relative flex">

                        <!-- Won -->
                        <p id="won">Won: <span>0</span></p>

                        <!-- Lost -->
                        <p id="lost">Lost: <span>0</span></p>

                        <!-- Draw -->
                        <p id="draw">Draw: <span>0</span></p>

                    </div>

                </div>
                
            </div>
        </section>

    </main>
    
    <script src="rockpaperscissor.js"></script>
    <script src="navbar.js"></script>
    
</body>
</html>
