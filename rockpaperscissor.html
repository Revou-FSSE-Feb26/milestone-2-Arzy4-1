<!DOCTYPE html>
<html lang="en" class="p-0 m-0">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="rockpaperscissor.css">
    <title>REVOFUN GAMES</title>
</head>
<body class="bg-slate-950 text-white">

    <header>

        <!-- Navbar Start -->
        <nav class="flex justify-between items-center py-4 px-8 fixed w-full z-100">

            <!-- Page Logo -->
            <img src="image/REVOFUN_Logo.png" alt="REVOFUN LOGO" href="#home" class="w-[150px]">

            <!-- Page Navigation -->
            <ul class="flex gap-8 text-xl">
                <li><a href="index.html">Home</a></li>
                <li class="relative group">
                    <a class="cursor-pointer">Games</a>
    
                    <!-- Dropdown Menu -->
                    <ul class="text-center absolute -translate-x-[63px] top-full mt-0 pt-2 w-48 rounded-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition duration-300">
                        <li class="px-4 py-2 duration-300 hover:scale-110 rounded-t-xl">
                            <a href="clicker.html">Click to Win</a>
                        </li>
                        <li class="px-4 py-2 duration-300 hover:scale-110">
                            <a href="numberguess.html">Guess the Number</a>
                        </li>
                        <li class="px-4 py-2 duration-300 hover:scale-110 rounded-b-xl">
                            <a href="rockpaperscissor.html">Rock Paper Scissors</a>
                        </li>
                    </ul>
                </li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>

        </nav>
        <!-- Navbar End -->

    </header>

    <main class="relative z-10 bg-slate-950">

        <div id="bg-image" class="flex justify-center items-center">
            <div id="game-container" class="relative w-[1000px] h-[600px] p-10 flex justify-center items-center overflow-hidden border-4 border-orange-500 rounded-[4rem] shadow-[0_10px_30px_rgba(0,0,0,1)]">

                <!-- Start -->
                <div id="start" class="absolute flex flex-col items-center justify-center h-full gap-6 text-center">
                    <h1 class="text-[25px]">Let's Play "<strong>ROCK PAPER SCISSOR</strong>"</h1>
                    <img id="start-button" src="image/REVOFUN_StartText.png" alt="" class="w-[200px]">
                </div>

                <!-- Player Choices -->
                <div id="player-choices-box" class="absolute w-[900px] h-[500px] hidden">
                    <img id="player-choice" src="image/REVOFUN_RockHand.png" alt="Weapon Rock Image" class="w-[250px] h-[250px] absolute top-1/6 ml-10">

                    <img id="versus" src="image/REVOFUN_VersusSymbol.png" alt="Versus Image" class="w-[300px] h-[250px] relative top-1/6 left-[295px]">
                    
                    <img id="computer-choice" src="image/REVOFUN_RockHand.png" alt="Weapon Rock Image" class="w-[250px] h-[250px] rotate-y-[180deg] absolute top-1/6 right-1 mr-10">
                </div>

                <!-- Weapon Choice -->
                <div id="weapon" class="flex flex-col items-center justify-between h-full hidden">
                    <h2 id="weapon-title" class="relative">ROCK PAPER SCISSOR</h2>
                    <div id="weapon-choice" class="relative flex flex-col items-center gap-8 hidden">   
                        <h3>Choose Your Weapon</h3>
                        <ul class="flex justify-center gap-10">
                            <li class="Rock">
                                <img src="image/REVOFUN_RockHand1.png" alt="">
                            </li>
                            <li class="Paper">
                                <img src="image/REVOFUN_PaperHand1.png" alt="">
                            </li>
                            <li class="Scissor">
                                <img src="image/REVOFUN_ScissorHand1.png" alt="">
                            </li>
                        </ul>
                    </div>

                    <!-- Play Again Button -->
                    <div id="result-box" class="relative flex flex-col top-[25%] p-4 items-center gap-5  hidden">
                        <h3 class="relative"></h3>
                        <div class="flex justify-center gap-10">
                            <button class="relative bg-indigo-900 hover:bg-blue-700 hover:scale-105 transition duration-300 p-4 w-[200px] rounded-lg" onclick="window.location.href='index.html'">Back to Home</button>
                            
                            <button id="restart" class="relative bg-indigo-900 hover:bg-blue-700 hover:scale-105 transition duration-300 p-4 w-[200px] rounded-lg">Restart</button>
                        </div>
                    </div>

                    <!-- Score Box -->
                    <div id="score-box">
                        <h4 id="won">Won: <span>0</span></h3>
                        <h4 id="lost">Lost: <span>0</span></h3>
                        <h4 id="draw">Draw: <span>0</span></h3>
                    </div>

                </div>
                
            </div>
        </div>

    </main>
    
    <script src="rockpaperscissor.js"></script>
</body>
</html>
