<!DOCTYPE html>
<html lang="en" class="p-0 m-0">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://kit.fontawesome.com/9c733af833.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="contact.css">
    <title>REVOFUN GAMES</title>
</head>
<body class="bg-slate-950 text-white">

    <!-- Header Start -->
    <header>

        <div id="navbar-placeholder"></div>

    </header>
    <!-- Header End -->

    <!-- Main Start -->
    <main class="mb-[400px] relative z-10 bg-slate-950">

        <section id="contact" class="contact flex flex-col items-center justify-center gap-4 relative z-20 h-[100vh]">
            <div class="contact-container relative z-20 flex flex-col gap-10">

                <!-- Contact Title & Tagline -->
                <div class="contact-title flex flex-col items-center text-center gap-2 px-1 pb-5">
                    <h1 class="text-4xl">LET'S GET IN TOUCH</h1>
                    <p class="text-2xl">I’d be happy to connect and collaborate with you!</p>
                </div>

                <div class="flex gap-10">
                    <!-- Contact Input Form -->
                    <div class="flex justify-center items-start px-1 gap-10">
                        <div class="flex flex-col items-center justify-center">
                            <form action="#" method="post">
                                <div class="cp-container [&_input]:h-[30px] [&_textarea]:h-[150px] w-[600px]">

                                    <!-- Name Input Form -->
                                    <div class="flex mb-1 gap-4">

                                        <!-- First Name -->
                                        <div class="flex flex-col flex-1">
                                            <label for="firstName">First Name</label>
                                            <input type="text" id="firstName" name="firstName" placeholder="Enter Your First Name" required>
                                        </div>

                                        <!-- Last Name -->
                                        <div class="flex flex-col flex-1">
                                            <label for="lastName">Last Name</label>
                                            <input type="text" id="lastName" name="lastName" placeholder="Enter Your Last Name" required>
                                        </div>
                                    </div>

                                    <!-- Email Input Form -->
                                    <div class="flex flex-col mb-1">
                                        <label for="email">Email Address</label>
                                        <input type="email" id="email" name="email" placeholder="Enter Your Email Address" required>
                                    </div>

                                    <!-- Message Textarea Form -->
                                    <div class="flex flex-col mb-1">
                                        <label for="message">Your Message</label>
                                        <textarea id="message" name="message" placeholder="Enter Your Message" rows="5" required></textarea>
                                    </div>

                                    <!-- Contact Button -->
                                    <div class="flex justify-center items-center bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                                        <button type="submit" aria-label="send message">Send Message</button>                       
                                    </div>
                                    
                                </div>
                            </form>
                            
                        </div>                    
                    </div>

                    <!-- Contact Information Icon and Social Links  -->
                    <div class="social-links-list">
                        <h2 class="text-center text-2xl">Contact Information</h2>
                        <ul class="flex flex-col gap-10 pt-5 [&_h3]:text-sm [&_span]:text-xl">

                            <!-- Linkedin -->
                            <li>
                                <h3>LINKEDIN</h3>
                                <a href="https://linkedin.com/in/robbyarzy/">
                                    <span>linkedin.com/in/robbyarzy</span>
                                </a>
                            </li>

                            <!-- Email -->
                            <li>
                                <h3>EMAIL</h3>
                                <a href="mailto:robbyarzy@gmail.com">
                                    <span>robbyarzy@gmail.com</span>
                                </a>
                            </li>

                            <!-- Whatsapp -->
                            <li>
                                <h3>WHATSAPP</h3>
                                <a href="https://wa.me/6282232138510">
                                    <span>(+62)822-3213-8510</span>
                                </a>
                            </li>

                        </ul>
                    </div>
                </div>

            </div>
        </section>

    </main>
    <!-- Main End -->

    <!-- Footer Start -->
    <div id="footer-placeholder"></div>
    <!-- Footer End -->
    
    <script src="navbar.js"></script>
    <script src="footer.js"></script>

</body>
</html>
